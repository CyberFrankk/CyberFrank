<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aurora 🌈</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#001510;user-select:none;}
canvas{position:fixed;inset:0;z-index:0;}
#splash{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#001510;transition:opacity 1.5s;cursor:pointer;}
#splash.hidden{opacity:0;pointer-events:none}
.splash-icon{font-size:80px;animation:pulse 2.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.tap-text{margin-top:24px;font-family:'Lato',sans-serif;font-size:13px;letter-spacing:5px;color:#86efac;opacity:.7;animation:blink 2s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:.7}50%{opacity:.15}}
#ui{position:fixed;inset:0;z-index:10;pointer-events:none;opacity:0;transition:opacity 2s .5s;}
#ui.visible{opacity:1}
.title{position:absolute;top:5%;left:0;right:0;text-align:center;font-family:'Cinzel',serif;font-size:clamp(1.8rem,6vw,3.8rem);font-weight:700;letter-spacing:6px;color:#bbf7d0;text-shadow:0 0 20px #16a34a,0 0 60px #15803d80;animation:glow 5s ease-in-out infinite;}
@keyframes glow{0%{text-shadow:0 0 20px #16a34a,0 0 60px #15803d60}33%{text-shadow:0 0 30px #0ea5e9,0 0 80px #0369a160}66%{text-shadow:0 0 30px #a855f7,0 0 80px #7e22ce60}100%{text-shadow:0 0 20px #16a34a,0 0 60px #15803d60}}
.name{position:absolute;top:22%;left:50%;transform:translateX(-50%);font-family:'Cinzel',serif;font-size:clamp(1.4rem,5vw,2.8rem);color:#fff;letter-spacing:5px;text-shadow:0 0 20px rgba(134,239,172,.6);white-space:nowrap;}
.message{position:absolute;bottom:20%;left:50%;transform:translateX(-50%);font-family:'Lato',sans-serif;font-size:clamp(1rem,3vw,1.6rem);font-weight:300;letter-spacing:4px;color:#d1fae5;white-space:nowrap;animation:float 5s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-10px)}}
.hint{position:absolute;bottom:9%;left:50%;transform:translateX(-50%);font-family:'Lato',sans-serif;font-size:11px;letter-spacing:3px;color:rgba(209,250,229,.25);white-space:nowrap;animation:blink 3s ease-in-out infinite;}
.float-word{position:fixed;pointer-events:none;z-index:9;font-family:'Lato',sans-serif;letter-spacing:2px;color:rgba(134,239,172,0.18);animation:wordFloat linear infinite;white-space:nowrap;}
@keyframes wordFloat{from{transform:translateY(100vh) rotate(var(--rot));opacity:0}10%{opacity:1}90%{opacity:.3}to{transform:translateY(-100px) rotate(var(--rot));opacity:0}}
#music-btn{position:fixed;bottom:22px;right:18px;z-index:200;background:rgba(22,163,74,.12);border:1px solid rgba(134,239,172,.4);border-radius:50%;width:52px;height:52px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.5rem;backdrop-filter:blur(8px);transition:all .3s;pointer-events:all;}
#music-btn:hover{background:rgba(22,163,74,.28);transform:scale(1.1)}
</style>
</head>
<body>
<div id="splash"><div class="splash-icon">🌈</div><div class="tap-text">TOCA PARA ABRIR</div></div>
<canvas id="c"></canvas>
<div id="ui">
  <div class="title">PARA TÍ</div>
  <div class="name" id="ui-name"></div>
  <div class="message" id="ui-message"></div>
  <div class="hint">✦ aurora boreal ✦</div>
</div>
<div id="music-btn">🎵</div>
<div id="yt-player" style="display:none;position:absolute;width:1px;height:1px"></div>
<script src="https://www.youtube.com/iframe_api"></script>
<script>
const params=new URLSearchParams(window.location.search);
const NOMBRE=params.get('nombre')||'Mi amor';
const MENSAJE=params.get('mensaje')||'Iluminas mi mundo 🌈';
const PALABRAS=params.get('palabras')||'';
const CANCION=params.get('cancion')||'';
document.getElementById('ui-name').textContent=NOMBRE;
document.getElementById('ui-message').textContent=MENSAJE;
function extractYTId(s){if(!s)return null;const m=s.match(/(?:v=|\/embed\/|\/shorts\/|youtu\.be\/)([a-zA-Z0-9_-]{11})/);if(m)return m[1];if(/^[a-zA-Z0-9_-]{11}$/.test(s))return s;return null;}
const ytId=extractYTId(CANCION);
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W,H,t=0,animActive=false;
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight;}resize();window.addEventListener('resize',resize);
const auroraColors=[['rgba(22,163,74,','rgba(16,185,129,'],['rgba(14,165,233,','rgba(99,102,241,'],['rgba(168,85,247,','rgba(236,72,153,'],['rgba(20,184,166,','rgba(34,197,94,']];
function draw(){if(!animActive)return;requestAnimationFrame(draw);t+=0.008;
ctx.fillStyle='rgba(0,21,16,0.08)';ctx.fillRect(0,0,W,H);
auroraColors.forEach((cols,i)=>{
  const phase=t+i*1.2,x=W*(0.2+i*0.2+Math.sin(phase*0.3)*0.15);
  const g=ctx.createLinearGradient(x,0,x+W*0.3,H*0.6);
  g.addColorStop(0,'transparent');g.addColorStop(0.3,cols[0]+'0.06)');
  g.addColorStop(0.6,cols[1]+'0.1)');g.addColorStop(1,'transparent');
  ctx.save();ctx.beginPath();
  for(let y=0;y<=H*0.6;y+=4){const xOff=Math.sin(y*0.01+phase)*80+Math.sin(y*0.007+phase*1.3)*40;ctx.lineTo(x+xOff,y);}
  ctx.lineTo(x+W*0.3,H*0.6);ctx.lineTo(x,H*0.6);ctx.closePath();
  ctx.fillStyle=g;ctx.fill();ctx.restore();});}
const defaultWords=['✨','Magia','Aurora','Luz','Contigo','Siempre','∞','Colores'];
function spawnWords(){
  const words=PALABRAS.trim()?PALABRAS.split(',').map(w=>w.trim()).filter(Boolean):defaultWords;
  for(let i=0;i<22;i++){const el=document.createElement('div');el.className='float-word';el.textContent=words[i%words.length];
  const left=Math.random()*92,size=12+Math.random()*18,dur=10+Math.random()*14,rot=(Math.random()-.5)*18+'deg',delay=Math.random()*-20;
  el.style.cssText=`left:${left}%;font-size:${size}px;--rot:${rot};animation-duration:${dur}s;animation-delay:${delay}s;bottom:-50px;`;document.body.appendChild(el);}
}
let player,musicOn=false;const mb=document.getElementById('music-btn');
function onYouTubeIframeAPIReady(){if(!ytId)return;player=new YT.Player('yt-player',{videoId:ytId,playerVars:{autoplay:0,loop:1,playlist:ytId,controls:0,fs:0},events:{}});}
mb.addEventListener('click',()=>{if(!player||typeof player.playVideo!=='function')return;if(musicOn){player.pauseVideo();mb.textContent='🎵';}else{player.playVideo();mb.textContent='⏸️';}musicOn=!musicOn;});
const splash=document.getElementById('splash'),ui=document.getElementById('ui');
splash.addEventListener('click',()=>{splash.classList.add('hidden');ui.classList.add('visible');animActive=true;draw();spawnWords();
if(ytId){const tp=setInterval(()=>{if(player&&typeof player.playVideo==='function'){player.playVideo();mb.textContent='⏸️';musicOn=true;clearInterval(tp);}},300);setTimeout(()=>clearInterval(tp),8000);}});
</script>
</body>
</html>
