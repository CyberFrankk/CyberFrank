<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Una pregunta especial 💌</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0d0010;user-select:none;}
canvas{position:fixed;inset:0;z-index:0;}

/* ── SPLASH ── */
#splash{
  position:fixed;inset:0;z-index:50;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:#0d0010;transition:opacity 1.5s ease;cursor:pointer;
}
#splash.hidden{opacity:0;pointer-events:none}
.splash-icon{font-size:80px;animation:pulse 2.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
.tap-text{
  margin-top:24px;font-family:'Lato',sans-serif;
  font-size:13px;letter-spacing:5px;color:#f9a8d4;opacity:.7;
  animation:blink 2s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:.7}50%{opacity:.15}}

/* ── CARTA ── */
#carta{
  position:fixed;inset:0;z-index:20;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity 1.5s ease .5s;pointer-events:none;
}
#carta.visible{opacity:1;pointer-events:all;}

.carta-box{
  background:rgba(15,5,25,0.95);
  border:1px solid rgba(249,168,212,0.35);
  border-radius:16px;
  padding:44px 40px 36px;
  max-width:440px;width:90%;
  text-align:center;
  box-shadow:0 0 60px rgba(236,72,153,0.15), 0 0 120px rgba(236,72,153,0.07);
  position:relative;
  overflow:visible;
  z-index:20;
}

/* Brillo superior de la carta */
.carta-box::before{
  content:'';
  position:absolute;top:0;left:10%;right:10%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(249,168,212,0.6),transparent);
}

.carta-over-emoji{font-size:52px;margin-bottom:16px;display:block;animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

.carta-saludo{
  font-family:'Dancing Script',cursive;
  font-size:clamp(1.1rem,4vw,1.5rem);
  color:#f9a8d4;margin-bottom:12px;
  text-shadow:0 0 20px rgba(249,168,212,0.5);
}
.carta-nombre{
  font-family:'Dancing Script',cursive;
  font-size:clamp(2rem,7vw,3rem);
  font-weight:700;
  color:#fff;
  text-shadow:0 0 25px rgba(249,168,212,0.7),0 0 50px rgba(236,72,153,0.4);
  margin-bottom:8px;
  display:block;
}
.carta-texto{
  font-family:'Lato',sans-serif;
  font-size:clamp(14px,3vw,16px);
  font-weight:300;
  line-height:1.7;
  color:rgba(255,220,235,0.85);
  margin:16px 0 28px;
}
.carta-pregunta{
  font-family:'Dancing Script',cursive;
  font-size:clamp(1.4rem,5vw,2rem);
  color:#f9a8d4;
  text-shadow:0 0 15px rgba(249,168,212,0.5);
  margin-bottom:28px;
  display:block;
}

/* ── BOTONES ── */
.btns-wrap{
  position:relative;
  display:flex;align-items:center;justify-content:center;gap:16px;
  min-height:60px;
}

.btn-si{
  font-family:'Dancing Script',cursive;
  font-size:20px;font-weight:700;
  padding:12px 32px;
  background:linear-gradient(135deg,#ec4899,#be185d);
  color:#fff;
  border:none;border-radius:50px;
  cursor:pointer;
  box-shadow:0 0 20px rgba(236,72,153,0.5);
  transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s;
  position:relative;z-index:2;
  white-space:nowrap;
  transform-origin:center;
}
.btn-si:hover{
  box-shadow:0 0 35px rgba(236,72,153,0.8);
}

.btn-no{
  font-family:'Dancing Script',cursive;
  font-size:18px;
  padding:10px 24px;
  background:rgba(234,179,8,0.15);
  color:#fbbf24;
  border:1px solid rgba(234,179,8,0.5);
  border-radius:50px;
  cursor:pointer;
  white-space:nowrap;
  position:fixed;
  z-index:99999;
  transition:left 0.35s cubic-bezier(0.25,0.46,0.45,0.94),
             top  0.35s cubic-bezier(0.25,0.46,0.45,0.94),
             transform 0.35s ease,
             opacity 0.35s ease;
}
.btn-no:hover{color:#fde68a;border-color:#fbbf24;}

/* ── RESPUESTA SÍ ── */
#respuesta-si{
  position:fixed;inset:0;z-index:60;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at center,#4a0020 0%,#0d0010 70%);
  opacity:0;pointer-events:none;
  transition:opacity 0.8s ease;
  text-align:center;padding:20px;
}
#respuesta-si.visible{opacity:1;pointer-events:all;}
.si-emoji{font-size:80px;animation:siPulse 1s ease-in-out infinite alternate;margin-bottom:20px;}
@keyframes siPulse{from{transform:scale(1)}to{transform:scale(1.15)}}
.si-titulo{
  font-family:'Dancing Script',cursive;
  font-size:clamp(2rem,8vw,4rem);
  color:#f9a8d4;
  text-shadow:0 0 30px rgba(249,168,212,0.8);
  margin-bottom:12px;
}
.si-subtitulo{
  font-family:'Lato',sans-serif;
  font-size:clamp(14px,3vw,18px);
  color:rgba(255,220,235,0.8);
  font-weight:300;
}

/* ── CORAZONES FLOTANTES ── */
.heart{
  position:fixed;pointer-events:none;z-index:15;
  animation:heartRise linear forwards;
  font-size:20px;
}
@keyframes heartRise{
  0%{transform:translateY(0) rotate(0deg) scale(0);opacity:0}
  15%{opacity:1;transform:translateY(-20px) scale(1)}
  100%{transform:translateY(-200px) rotate(var(--rot)) scale(0.5);opacity:0}
}

#music-btn{
  position:fixed;bottom:22px;right:18px;z-index:200;
  background:rgba(236,72,153,.15);border:1px solid rgba(249,168,212,.4);
  border-radius:50%;width:52px;height:52px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:1.5rem;
  transition:background .3s,transform .2s;pointer-events:all;
}
#music-btn:hover{background:rgba(236,72,153,.28);transform:scale(1.1)}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-icon">💌</div>
  <div class="tap-text">TOCA PARA ABRIR</div>
</div>

<canvas id="c"></canvas>

<!-- CARTA -->
<div id="carta">
  <div class="carta-box">
    <span class="carta-over-emoji">💝</span>
    <div class="carta-saludo">Hola,</div>
    <span class="carta-nombre" id="c-nombre">Mi amor</span>
    <p class="carta-texto" id="c-texto">
      Desde que te conozco, cada día es mejor que el anterior.
      Me alegras los momentos, me robas las palabras... y definitivamente me robaste el corazón. 💕
    </p>
    <span class="carta-pregunta">¿Quieres salir conmigo? 🌹</span>
    <div class="btns-wrap" id="btns-wrap">
      <button class="btn-si" id="btn-si" onclick="responderSi()">¡Sí! 💖</button>
      <!-- espacio reservado para el NO -->
      <div id="btn-no-placeholder" style="width:120px;height:44px;"></div>
    </div>
  </div>
</div>

<!-- BOTÓN NO — fuera de todo contenedor, directo en body -->
<button class="btn-no" id="btn-no" onclick="noClickeado()">No 😶</button>

<!-- RESPUESTA SÍ -->
<div id="respuesta-si">
  <div class="si-emoji">🥰</div>
  <div class="si-titulo">¡Sabía que dirías que sí!</div>
  <p class="si-subtitulo" id="si-sub">Esta será la mejor decisión de tu vida 💕</p>
</div>

<div id="music-btn">🎵</div>
<div id="yt-player" style="display:none;position:absolute;width:1px;height:1px"></div>
<script src="https://www.youtube.com/iframe_api"></script>

<script>
// ── PARÁMETROS ──
const params   = new URLSearchParams(window.location.search);
const NOMBRE   = params.get('nombre')  || 'Mi amor';
const MENSAJE  = params.get('mensaje') || 'Desde que te conozco, cada día es mejor que el anterior. Me alegras los momentos, me robas las palabras... y definitivamente me robaste el corazón. 💕';
const CANCION  = params.get('cancion') || '';

document.getElementById('c-nombre').textContent = NOMBRE;
document.getElementById('c-texto').textContent  = MENSAJE;

function extractYTId(s){
  if(!s) return null;
  const m=s.match(/(?:v=|\/embed\/|\/shorts\/|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  if(m) return m[1];
  if(/^[a-zA-Z0-9_-]{11}$/.test(s)) return s;
  return null;
}
const ytId = extractYTId(CANCION);

// ── CANVAS FONDO ──
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H, particles = [];

function resize(){ W=canvas.width=innerWidth; H=canvas.height=innerHeight; }
resize(); window.addEventListener('resize', resize);

function initParticles(){
  particles = [];
  for(let i=0;i<120;i++){
    particles.push({
      x: Math.random()*W, y: Math.random()*H,
      vx:(Math.random()-.5)*0.3, vy:-0.2-Math.random()*0.5,
      r: 1+Math.random()*2,
      a: Math.random(),
      color: Math.random()<0.5 ? '#ec4899' : '#f9a8d4',
      phase: Math.random()*Math.PI*2,
    });
  }
}
initParticles();

let t=0, animActive=false;
function draw(){
  if(!animActive) return;
  requestAnimationFrame(draw);
  t += 0.016;
  ctx.fillStyle='rgba(13,0,16,0.18)';
  ctx.fillRect(0,0,W,H);

  particles.forEach(p=>{
    p.x += p.vx + Math.sin(t+p.phase)*0.3;
    p.y += p.vy;
    p.a = 0.3+0.5*Math.abs(Math.sin(t*0.5+p.phase));
    if(p.y < -10){ p.y=H+10; p.x=Math.random()*W; }

    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=p.color.replace(')',`,${p.a})`).replace('rgb','rgba').replace('#ec4899',`rgba(236,72,153,${p.a})`).replace('#f9a8d4',`rgba(249,168,212,${p.a})`);

    // Dibujar como corazón pequeño o círculo
    if(p.r > 1.5){
      drawHeart(ctx, p.x, p.y, p.r*1.8, p.a);
    } else {
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(249,168,212,${p.a})`;
      ctx.fill();
    }
  });
}

function drawHeart(ctx, x, y, size, alpha){
  ctx.save();
  ctx.translate(x,y);
  ctx.scale(size/10, size/10);
  ctx.beginPath();
  ctx.moveTo(0,-3);
  ctx.bezierCurveTo(5,-8,10,-3,0,5);
  ctx.bezierCurveTo(-10,-3,-5,-8,0,-3);
  ctx.fillStyle=`rgba(236,72,153,${alpha})`;
  ctx.fill();
  ctx.restore();
}

// ── LÓGICA BOTONES ──
let noCount = 0;
let siSize  = 1;
const btnNo = document.getElementById('btn-no');
const btnSi = document.getElementById('btn-si');

// Posicionar el NO sobre el placeholder al mostrar la carta
function posicionarNoInicial(){
  const ph = document.getElementById('btn-no-placeholder');
  if(!ph) return;
  const r = ph.getBoundingClientRect();
  btnNo.style.left = r.left + 'px';
  btnNo.style.top  = r.top  + 'px';
}

const frases = [
  'No 😶','Hmm... 🤔','¿Seguro? 😅','Piénsalo bien 👀',
  'Dale otra vez 😂','¿En serio? 🥺','No me hagas esto 😭',
  'Última oportunidad 🙏','¡Cobardeeee! 😝','Eso no existe aquí 😤'
];

function noClickeado(){
  noCount++;

  // Crecer el SÍ
  siSize = Math.min(1 + noCount * 0.22, 4.5);
  btnSi.style.transform = `scale(${siSize})`;
  btnSi.style.zIndex = 2;

  // Cambiar texto
  btnNo.textContent = frases[Math.min(noCount, frases.length - 1)];

  // Encoger y desvanecer
  const noScale = Math.max(1 - noCount * 0.08, 0.25);
  btnNo.style.opacity = Math.max(0.9 - noCount * 0.07, 0.15) + '';

  // Saltar a posición aleatoria evitando bordes
  const margin = 60, btnW = 140, btnH = 50;
  const rx = margin + Math.random() * (W - margin * 2 - btnW);
  const ry = margin + Math.random() * (H - margin * 2 - btnH);
  btnNo.style.left = rx + 'px';
  btnNo.style.top  = ry + 'px';
  btnNo.style.transform = `scale(${noScale})`;

  if(noCount >= 9) btnNo.style.display = 'none';
  spawnHearts(3);
}

function responderSi(){
  spawnHearts(20);
  setTimeout(()=>{
    document.getElementById('carta').style.opacity='0';
    document.getElementById('carta').style.pointerEvents='none';
    setTimeout(()=>{
      document.getElementById('respuesta-si').classList.add('visible');
      spawnHearts(30);
      startHeartRain();
    },600);
  },300);
}

// ── CORAZONES VOLADORES ──
function spawnHearts(n){
  for(let i=0;i<n;i++){
    setTimeout(()=>{
      const el=document.createElement('div');
      el.className='heart';
      el.textContent=['💕','💖','💗','💓','❤️','🩷'][Math.floor(Math.random()*6)];
      el.style.left=20+Math.random()*60+'%';
      el.style.top=30+Math.random()*40+'%';
      el.style.setProperty('--rot',(Math.random()-.5)*60+'deg');
      el.style.animationDuration=1+Math.random()*1.5+'s';
      el.style.fontSize=14+Math.random()*20+'px';
      document.body.appendChild(el);
      setTimeout(()=>el.remove(),2500);
    },i*80);
  }
}

function startHeartRain(){
  setInterval(()=>spawnHearts(2),300);
}

// ── YOUTUBE ──
let player, musicOn=false;
const mb=document.getElementById('music-btn');
function onYouTubeIframeAPIReady(){
  if(!ytId) return;
  player=new YT.Player('yt-player',{
    videoId:ytId,
    playerVars:{autoplay:0,loop:1,playlist:ytId,controls:0,fs:0},
    events:{}
  });
}
mb.addEventListener('click',()=>{
  if(!player||typeof player.playVideo!=='function') return;
  if(musicOn){player.pauseVideo();mb.textContent='🎵';}
  else{player.playVideo();mb.textContent='⏸️';}
  musicOn=!musicOn;
});

// ── SPLASH ──
const splash=document.getElementById('splash');
const carta=document.getElementById('carta');
splash.addEventListener('click',()=>{
  splash.classList.add('hidden');
  carta.classList.add('visible');
  animActive=true;
  draw();
  // Posicionar el NO sobre su placeholder después de que la carta aparezca
  setTimeout(posicionarNoInicial, 600);
  setInterval(()=>spawnHearts(1),2000);
  if(ytId){
    const tp=setInterval(()=>{
      if(player&&typeof player.playVideo==='function'){
        player.playVideo();mb.textContent='⏸️';musicOn=true;clearInterval(tp);
      }
    },300);
    setTimeout(()=>clearInterval(tp),8000);
  }
});
</script>
</body>
</html>
