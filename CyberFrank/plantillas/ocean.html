<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ocean 🌊</title>
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;700&family=Cormorant+Garamond:ital,wght@1,300&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#001a2e;user-select:none;}
canvas{position:fixed;inset:0;z-index:0;}
#splash{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#001a2e;transition:opacity 1.5s;cursor:pointer;}
#splash.hidden{opacity:0;pointer-events:none}
.splash-icon{font-size:80px;animation:wave 2.5s ease-in-out infinite;}
@keyframes wave{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-15px) rotate(5deg)}}
.tap-text{margin-top:24px;font-family:'Josefin Sans',sans-serif;font-size:13px;letter-spacing:5px;color:#38bdf8;opacity:.7;animation:blink 2s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:.7}50%{opacity:.15}}
#ui{position:fixed;inset:0;z-index:10;pointer-events:none;opacity:0;transition:opacity 2s .5s;}
#ui.visible{opacity:1}
.title{position:absolute;top:5%;left:0;right:0;text-align:center;font-family:'Josefin Sans',sans-serif;font-size:clamp(2rem,7vw,4rem);font-weight:700;letter-spacing:8px;color:#7dd3fc;text-shadow:0 0 20px #0284c7,0 0 60px #075985;animation:glow 4s ease-in-out infinite;}
@keyframes glow{0%,100%{text-shadow:0 0 20px #0284c7,0 0 60px #07598560}50%{text-shadow:0 0 40px #38bdf8,0 0 100px #0284c780}}
.name{position:absolute;top:22%;left:50%;transform:translateX(-50%);font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(1.6rem,5vw,3rem);color:#fff;text-shadow:0 0 20px #38bdf880;white-space:nowrap;}
.message{position:absolute;bottom:20%;left:50%;transform:translateX(-50%);font-family:'Josefin Sans',sans-serif;font-size:clamp(1rem,3vw,1.8rem);font-weight:300;letter-spacing:4px;color:#bae6fd;white-space:nowrap;animation:float 5s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-10px)}}
.hint{position:absolute;bottom:9%;left:50%;transform:translateX(-50%);font-family:'Josefin Sans',sans-serif;font-size:11px;letter-spacing:3px;color:rgba(186,230,253,.25);white-space:nowrap;animation:blink 3s ease-in-out infinite;}
.bubble{position:fixed;border-radius:50%;pointer-events:none;z-index:8;border:1px solid rgba(56,189,248,0.3);animation:bubbleRise linear infinite;}
@keyframes bubbleRise{0%{transform:translateY(0) translateX(0);opacity:0}15%{opacity:.6}85%{opacity:.3}100%{transform:translateY(-110vh) translateX(var(--dx));opacity:0}}
.float-word{position:fixed;pointer-events:none;z-index:9;font-family:'Josefin Sans',sans-serif;letter-spacing:3px;color:rgba(125,211,252,0.2);animation:wordFloat linear infinite;white-space:nowrap;}
@keyframes wordFloat{from{transform:translateY(100vh) rotate(var(--rot));opacity:0}10%{opacity:1}90%{opacity:.3}to{transform:translateY(-100px) rotate(var(--rot));opacity:0}}
#music-btn{position:fixed;bottom:22px;right:18px;z-index:200;background:rgba(2,132,199,.12);border:1px solid rgba(56,189,248,.4);border-radius:50%;width:52px;height:52px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.5rem;backdrop-filter:blur(8px);transition:all .3s;pointer-events:all;}
#music-btn:hover{background:rgba(2,132,199,.28);transform:scale(1.1)}
</style>
</head>
<body>
<div id="splash"><div class="splash-icon">🌊</div><div class="tap-text">TOCA PARA ABRIR</div></div>
<canvas id="c"></canvas>
<div id="ui">
  <div class="title">PARA TÍ</div>
  <div class="name" id="ui-name"></div>
  <div class="message" id="ui-message"></div>
  <div class="hint">✦ como el mar, sin fin ✦</div>
</div>
<div id="music-btn">🎵</div>
<div id="yt-player" style="display:none;position:absolute;width:1px;height:1px"></div>
<script src="https://www.youtube.com/iframe_api"></script>
<script>
const params=new URLSearchParams(window.location.search);
const NOMBRE=params.get('nombre')||'Mi amor';
const MENSAJE=params.get('mensaje')||'Tan profundo como el mar 🌊';
const PALABRAS=params.get('palabras')||'';
const CANCION=params.get('cancion')||'';
document.getElementById('ui-name').textContent=NOMBRE;
document.getElementById('ui-message').textContent=MENSAJE;
function extractYTId(s){if(!s)return null;const m=s.match(/(?:v=|\/embed\/|\/shorts\/|youtu\.be\/)([a-zA-Z0-9_-]{11})/);if(m)return m[1];if(/^[a-zA-Z0-9_-]{11}$/.test(s))return s;return null;}
const ytId=extractYTId(CANCION);
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W,H,t=0,animActive=false;
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight;}resize();window.addEventListener('resize',resize);
// Olas
const waves=[{a:60,f:0.008,s:0.4,y:0.7,op:0.06},{a:40,f:0.012,s:0.6,y:0.75,op:0.08},{a:30,f:0.018,s:0.8,y:0.8,op:0.1},{a:20,f:0.025,s:1.2,y:0.85,op:0.12}];
function draw(){if(!animActive)return;requestAnimationFrame(draw);t+=0.016;
ctx.fillStyle='rgba(0,26,46,0.1)';ctx.fillRect(0,0,W,H);
waves.forEach(w=>{
  ctx.beginPath();ctx.moveTo(0,H);
  for(let x=0;x<=W;x+=4){const y=H*w.y+Math.sin(x*w.f+t*w.s)*w.a+Math.sin(x*w.f*1.7+t*w.s*1.3)*w.a*0.4;ctx.lineTo(x,y);}
  ctx.lineTo(W,H);ctx.closePath();
  const g=ctx.createLinearGradient(0,H*w.y-w.a,0,H);
  g.addColorStop(0,`rgba(56,189,248,${w.op*2})`);g.addColorStop(1,`rgba(2,132,199,${w.op})`);
  ctx.fillStyle=g;ctx.fill();});}
const defaultWords=['🌊','Profundo','Inmenso','Contigo','Siempre','∞','Amor','Mar'];
function spawnWords(){
  const words=PALABRAS.trim()?PALABRAS.split(',').map(w=>w.trim()).filter(Boolean):defaultWords;
  for(let i=0;i<20;i++){const el=document.createElement('div');el.className='float-word';el.textContent=words[i%words.length];
  const left=Math.random()*92,size=12+Math.random()*16,dur=10+Math.random()*14,rot=(Math.random()-.5)*15+'deg',delay=Math.random()*-20;
  el.style.cssText=`left:${left}%;font-size:${size}px;--rot:${rot};animation-duration:${dur}s;animation-delay:${delay}s;bottom:-50px;`;document.body.appendChild(el);}
}
function spawnBubble(){const el=document.createElement('div');el.className='bubble';
const sz=6+Math.random()*20;el.style.cssText=`width:${sz}px;height:${sz}px;left:${10+Math.random()*80}%;bottom:${Math.random()*30}%;--dx:${(Math.random()-.5)*60}px;animation-duration:${5+Math.random()*8}s;animation-delay:${Math.random()*3}s`;
document.body.appendChild(el);setTimeout(()=>el.remove(),12000);}
let player,musicOn=false;const mb=document.getElementById('music-btn');
function onYouTubeIframeAPIReady(){if(!ytId)return;player=new YT.Player('yt-player',{videoId:ytId,playerVars:{autoplay:0,loop:1,playlist:ytId,controls:0,fs:0},events:{}});}
mb.addEventListener('click',()=>{if(!player||typeof player.playVideo!=='function')return;if(musicOn){player.pauseVideo();mb.textContent='🎵';}else{player.playVideo();mb.textContent='⏸️';}musicOn=!musicOn;});
const splash=document.getElementById('splash'),ui=document.getElementById('ui');
splash.addEventListener('click',()=>{splash.classList.add('hidden');ui.classList.add('visible');animActive=true;draw();spawnWords();
for(let i=0;i<6;i++)setTimeout(spawnBubble,i*200);setInterval(spawnBubble,1200);
if(ytId){const tp=setInterval(()=>{if(player&&typeof player.playVideo==='function'){player.playVideo();mb.textContent='⏸️';musicOn=true;clearInterval(tp);}},300);setTimeout(()=>clearInterval(tp),8000);}});
</script>
</body>
</html>
