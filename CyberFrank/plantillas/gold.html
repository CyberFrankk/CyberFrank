<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gold 👑</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0d0800;user-select:none;}
canvas{position:fixed;inset:0;z-index:0;}
#splash{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0d0800;transition:opacity 1.5s;cursor:pointer;}
#splash.hidden{opacity:0;pointer-events:none}
.splash-icon{font-size:80px;animation:pulse 2.5s ease-in-out infinite;filter:drop-shadow(0 0 20px #fbbf24);}
@keyframes pulse{0%,100%{transform:scale(1) rotate(-3deg)}50%{transform:scale(1.1) rotate(3deg)}}
.tap-text{margin-top:24px;font-family:'Lato',sans-serif;font-size:13px;letter-spacing:5px;color:#fbbf24;opacity:.7;animation:blink 2s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:.7}50%{opacity:.15}}
#ui{position:fixed;inset:0;z-index:10;pointer-events:none;opacity:0;transition:opacity 2s .5s;}
#ui.visible{opacity:1}
.title{position:absolute;top:5%;left:0;right:0;text-align:center;font-family:'Playfair Display',serif;font-size:clamp(2rem,7vw,4.5rem);font-style:italic;color:#fde68a;text-shadow:0 0 20px #d97706,0 0 60px #92400e80;animation:glow 4s ease-in-out infinite;}
@keyframes glow{0%,100%{text-shadow:0 0 20px #d97706,0 0 60px #92400e60}50%{text-shadow:0 0 40px #fbbf24,0 0 100px #d9770680,0 0 160px #92400e40}}
.name{position:absolute;top:22%;left:50%;transform:translateX(-50%);font-family:'Playfair Display',serif;font-size:clamp(1.6rem,5vw,3rem);font-weight:700;letter-spacing:5px;color:#fff;text-shadow:0 0 20px #fbbf2480;white-space:nowrap;}
.message{position:absolute;bottom:20%;left:50%;transform:translateX(-50%);font-family:'Lato',sans-serif;font-size:clamp(1rem,3vw,1.7rem);font-weight:300;letter-spacing:4px;color:#fde68a;white-space:nowrap;animation:float 5s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-10px)}}
.hint{position:absolute;bottom:9%;left:50%;transform:translateX(-50%);font-family:'Lato',sans-serif;font-size:11px;letter-spacing:3px;color:rgba(253,230,138,.25);white-space:nowrap;animation:blink 3s ease-in-out infinite;}
.float-word{position:fixed;pointer-events:none;z-index:9;font-family:'Playfair Display',serif;font-style:italic;color:rgba(251,191,36,0.15);animation:wordFloat linear infinite;white-space:nowrap;}
@keyframes wordFloat{from{transform:translateY(100vh) rotate(var(--rot));opacity:0}10%{opacity:1}90%{opacity:.3}to{transform:translateY(-100px) rotate(var(--rot));opacity:0}}
.gold-particle{position:fixed;pointer-events:none;z-index:8;border-radius:50%;animation:glitter linear infinite;}
@keyframes glitter{0%{opacity:0;transform:translateY(0) scale(0) rotate(0)}20%{opacity:1;transform:scale(1) rotate(180deg)}80%{opacity:.5}100%{opacity:0;transform:translateY(-100px) scale(.2) rotate(360deg)}}
#music-btn{position:fixed;bottom:22px;right:18px;z-index:200;background:rgba(217,119,6,.12);border:1px solid rgba(251,191,36,.4);border-radius:50%;width:52px;height:52px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.5rem;backdrop-filter:blur(8px);transition:all .3s;pointer-events:all;}
#music-btn:hover{background:rgba(217,119,6,.28);transform:scale(1.1)}
</style>
</head>
<body>
<div id="splash"><div class="splash-icon">👑</div><div class="tap-text">TOCA PARA ABRIR</div></div>
<canvas id="c"></canvas>
<div id="ui">
  <div class="title">Para tí, mi Reina</div>
  <div class="name" id="ui-name"></div>
  <div class="message" id="ui-message"></div>
  <div class="hint">✦ digna del oro ✦</div>
</div>
<div id="music-btn">🎵</div>
<div id="yt-player" style="display:none;position:absolute;width:1px;height:1px"></div>
<script src="https://www.youtube.com/iframe_api"></script>
<script>
const params=new URLSearchParams(window.location.search);
const NOMBRE=params.get('nombre')||'Mi Reina';
const MENSAJE=params.get('mensaje')||'Vales más que el oro 👑';
const PALABRAS=params.get('palabras')||'';
const CANCION=params.get('cancion')||'';
document.getElementById('ui-name').textContent=NOMBRE;
document.getElementById('ui-message').textContent=MENSAJE;
function extractYTId(s){if(!s)return null;const m=s.match(/(?:v=|\/embed\/|\/shorts\/|youtu\.be\/)([a-zA-Z0-9_-]{11})/);if(m)return m[1];if(/^[a-zA-Z0-9_-]{11}$/.test(s))return s;return null;}
const ytId=extractYTId(CANCION);
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W,H,t=0,animActive=false;
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight;}resize();window.addEventListener('resize',resize);
function draw(){if(!animActive)return;requestAnimationFrame(draw);t+=0.01;
ctx.fillStyle='rgba(13,8,0,0.1)';ctx.fillRect(0,0,W,H);
// Efecto dorado radial pulsante
const r=Math.min(W,H)*0.4*(1+Math.sin(t)*0.05);
const g=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,r);
g.addColorStop(0,'rgba(217,119,6,0.06)');g.addColorStop(0.5,'rgba(251,191,36,0.03)');g.addColorStop(1,'transparent');
ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
// Líneas doradas sutiles
for(let i=0;i<3;i++){
  ctx.beginPath();const y=H*(0.3+i*0.2)+Math.sin(t+i)*15;
  ctx.moveTo(0,y);ctx.bezierCurveTo(W/3,y+Math.sin(t*0.7+i)*20,W*2/3,y-Math.sin(t*0.9+i)*20,W,y);
  ctx.strokeStyle=`rgba(251,191,36,0.03)`;ctx.lineWidth=1;ctx.stroke();}}
const defaultWords=['👑','Reina','Oro','Valiosa','Única','Amor','Corona','Brillante'];
function spawnWords(){
  const words=PALABRAS.trim()?PALABRAS.split(',').map(w=>w.trim()).filter(Boolean):defaultWords;
  for(let i=0;i<22;i++){const el=document.createElement('div');el.className='float-word';el.textContent=words[i%words.length];
  const left=Math.random()*92,size=12+Math.random()*20,dur=10+Math.random()*14,rot=(Math.random()-.5)*18+'deg',delay=Math.random()*-20;
  el.style.cssText=`left:${left}%;font-size:${size}px;--rot:${rot};animation-duration:${dur}s;animation-delay:${delay}s;bottom:-50px;`;document.body.appendChild(el);}
}
function spawnGlitter(){const el=document.createElement('div');el.className='gold-particle';
const sz=2+Math.random()*5;const cols=['#fbbf24','#fde68a','#f59e0b','#fffbeb'];
const col=cols[Math.floor(Math.random()*cols.length)];
el.style.cssText=`width:${sz}px;height:${sz}px;background:${col};box-shadow:0 0 ${sz*3}px ${col};left:${10+Math.random()*80}%;top:${15+Math.random()*65}%;animation-duration:${3+Math.random()*5}s;animation-delay:${Math.random()*2}s`;
document.body.appendChild(el);setTimeout(()=>el.remove(),7000);}
let player,musicOn=false;const mb=document.getElementById('music-btn');
function onYouTubeIframeAPIReady(){if(!ytId)return;player=new YT.Player('yt-player',{videoId:ytId,playerVars:{autoplay:0,loop:1,playlist:ytId,controls:0,fs:0},events:{}});}
mb.addEventListener('click',()=>{if(!player||typeof player.playVideo!=='function')return;if(musicOn){player.pauseVideo();mb.textContent='🎵';}else{player.playVideo();mb.textContent='⏸️';}musicOn=!musicOn;});
const splash=document.getElementById('splash'),ui=document.getElementById('ui');
splash.addEventListener('click',()=>{splash.classList.add('hidden');ui.classList.add('visible');animActive=true;draw();spawnWords();
for(let i=0;i<8;i++)setTimeout(spawnGlitter,i*150);setInterval(spawnGlitter,400);
if(ytId){const tp=setInterval(()=>{if(player&&typeof player.playVideo==='function'){player.playVideo();mb.textContent='⏸️';musicOn=true;clearInterval(tp);}},300);setTimeout(()=>clearInterval(tp),8000);}});
</script>
</body>
</html>
